<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 72" fill="none">
  <!-- Orange tilted square with three parallel diagonal lines (left side) -->
  <g transform="translate(35, 2)">
    <rect x="4" y="4" width="32" height="32" rx="4" transform="rotate(-12 20 20)" fill="#F06021"/>
    <line x1="10" y1="14" x2="2" y2="6" stroke="#F06021" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="10" x2="6" y2="2" stroke="#F06021" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="6" x2="10" y2="0" stroke="#F06021" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- worqhub text -->
  <text x="70" y="62" font-family="Poppins, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#1f2937" text-anchor="middle" letter-spacing="-0.02em">worqhub</text>
</svg>
